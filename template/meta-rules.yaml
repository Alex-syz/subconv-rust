CUSTOM_PROXY_GROUP:
# === 基础组 ===
- name: ♻️ 自动选择
  type: url-test
  rule: false
- name: 🚀 手动切换
  type: select
  manual: true
  rule: false
- name: 🔯 故障转移
  type: fallback
  rule: false
# === 规则组 ===
- name: 🤖 AI平台
  type: select
  prior: PROXY
- name: 💬 AI对话
  type: select
  prior: PROXY
- name: 📹 油管视频
  type: select
  prior: PROXY
- name: 🎥 奈飞视频
  type: select
  prior: PROXY
- name: 📺 哔哩哔哩
  type: select
  prior: DIRECT
- name: 📢 谷歌服务
  type: select
  prior: PROXY
- name: Ⓜ️ 微软服务
  type: select
  prior: DIRECT
- name: 🍎 苹果服务
  type: select
  prior: DIRECT
- name: 📲 电报消息
  type: select
  prior: PROXY
- name: 🎮 Steam
  type: select
  prior: DIRECT
- name: 🕹️ 游戏平台
  type: select
  prior: PROXY
- name: 🐙 GitHub
  type: select
  prior: PROXY
- name: 🛑 广告拦截
  type: select
  prior: REJECT
- name: 🎯 全球直连
  type: select
  prior: DIRECT
- name: 🐟 漏网之鱼
  type: select
  prior: PROXY
# === 地区组 ===
- name: 🇭🇰 香港节点
  type: url-test
  rule: false
  regex: (?i:\b(?:HK|HKG)\d*\b|Hong.*?Kong|\bHKT\b|\bHKBN\b|\bHGC\b|\bWTT\b|\bCMI\b|[^-]港)
- name: 🇨🇳 台湾节点
  type: url-test
  rule: false
  regex: (?i:\b(?:TW|TWN)\d*\b|Taiwan|新北|彰化|\bCHT\b|台湾|[^-]台|\bHINET\b)
- name: 🇸🇬 狮城节点
  type: url-test
  rule: false
  regex: (?i:\b(?:SG|SGP)\d*\b|Singapore|新加坡|狮城|[^-]新)
- name: 🇯🇵 日本节点
  type: url-test
  rule: false
  regex: (?i:\b(?:JP|JPN)\d*\b|Japan|Tokyo|Osaka|Saitama|日本|东京|大阪|埼玉|[^-]日)
- name: 🇰🇷 韩国节点
  type: url-test
  rule: false
  regex: \b(?:KR|KOR)\d*\b|Korea|首尔|韩|韓
- name: 🇺🇸 美国节点
  type: url-test
  rule: false
  regex: (?i:\b(?:US|USA)\d*\b|America|United.*?States|美国|[^-]美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥)

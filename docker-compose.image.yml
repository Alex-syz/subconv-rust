# 启动前必须确保当前目录存在普通文件 config.yaml：
#   cp config.yaml.example config.yaml
# 如果文件不存在，Docker 可能把挂载目标创建成目录并导致服务启动失败。
services:
  subconv:
    image: "${SUBCONV_IMAGE:?Set SUBCONV_IMAGE to the Docker Hub image name}"
    ports:
      - "${SUBCONV_PORT:-8080}:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./template:/app/template:ro
      - cache-data:/app/cache
    restart: unless-stopped

volumes:
  cache-data:
